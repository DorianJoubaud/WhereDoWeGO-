name: Deploy WhereDoWeGo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy at a time; cancel in-progress builds when a newer
# commit lands so we never deploy a stale state.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Google Places API key
        env:
          GP_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          if [ -z "$GP_KEY" ]; then
            echo "::error::GOOGLE_PLACES_API_KEY repo secret is not set. The deployed app will fail when calling Places."
            exit 1
          fi
          # Escape characters that have special meaning to sed's replacement: backslash, slash, ampersand.
          ESCAPED=$(printf '%s' "$GP_KEY" | sed 's:[\\/&]:\\&:g')
          sed -i "s|@@PLACEHOLDER@@|$ESCAPED|" js/main.js

          # Sanity check: confirm the placeholder is gone.
          if grep -q '@@PLACEHOLDER@@' js/main.js; then
            echo "::error::Placeholder was not substituted in js/main.js"
            exit 1
          fi
          echo "Key injected (length=${#GP_KEY})."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo (no build step needed for a static site).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
