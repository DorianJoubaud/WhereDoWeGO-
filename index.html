<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte & Recherche de Commerces</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
/>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

</head>
<body>
    <div id="container">
        <div id="sidebar">
            <h2>Points</h2>
            <div id="pointsList"></div>
            <select id="businessType">
                <option value="">Type de commerce (optionnel)</option>
                <option value="restaurant">Restaurant</option>
                <option value="cafe">Café</option>
                <option value="bar">Bar</option>
                <option value="hotel">Hôtel</option>
                <option value="supermarket">Supermarché</option>
                <option value="pharmacy">Pharmacie</option>
                <option value="bank">Banque</option>
            </select>
            <button id="addFromMapButton">Ajouter sur la carte</button>
            <button id="searchBusinessButton">Chercher</button>
            <button id="clearButton">Effacer</button>
            <div id="businessInfo" class="info-card" style="display: none;"></div>
            <button id="toggleHullButton">Afficher enveloppe convexe</button>
            <a href="maths.html" target="_blank" id="mathBtn">📘 Voir les mathématiques</a>



        </div>
        <div id="map"></div>
    </div>
    <script src="js/utils3d.js"></script>

    <script src="js/main.js"></script>
</body>
</html>
